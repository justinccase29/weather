<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1117">
<title>Bike Weather</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --bg:#0e1117; --card:#171c26; --card2:#1e2532; --line:#2a3242;
  --txt:#e8edf4; --dim:#8b96a8; --accent:#4da3ff; --rain:#3d8bfd;
  --good:#3ecf6e; --ok:#f2c94c; --bad:#ff6b6b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
     -webkit-font-smoothing:antialiased;padding-bottom:86px}
.page{display:none}
.page.on{display:block}

/* ---------- bottom tab bar ---------- */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:600;display:flex;
        background:rgba(14,17,23,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);
        padding-bottom:env(safe-area-inset-bottom)}
#tabbar button{flex:1;background:none;border:none;color:var(--dim);font-size:19px;
               padding:8px 0 6px;cursor:pointer;display:flex;flex-direction:column;
               align-items:center;gap:2px}
#tabbar button span{font-size:10.5px;font-weight:600;letter-spacing:.04em}
#tabbar button.on{color:var(--accent)}
.wrap{max-width:720px;margin:0 auto;padding:0 12px}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:500;background:rgba(14,17,23,.92);backdrop-filter:blur(8px);
       border-bottom:1px solid var(--line)}
.hbar{display:flex;align-items:center;gap:8px;padding:10px 12px;max-width:720px;margin:0 auto}
.hloc{flex:1;min-width:0}
.hloc h1{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hloc small{color:var(--dim);font-size:11px}
.ibtn{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;
      min-width:38px;height:38px;font-size:17px;cursor:pointer;flex-shrink:0}
.ibtn:active{background:var(--line)}
.ibtn.on{color:#ffd54d;border-color:#ffd54d55}
.chips{display:flex;gap:6px;overflow-x:auto;padding:0 12px 8px;max-width:720px;margin:0 auto;
       scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{display:flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);
      color:var(--txt);border-radius:999px;padding:5px 11px;font-size:13px;white-space:nowrap;cursor:pointer}
.chip.cur{border-color:var(--accent);color:var(--accent)}
.chip .x{color:var(--dim);font-size:12px;padding:0 0 0 2px}
.chip .x:active{color:var(--bad)}
.chip .mv{color:var(--accent);font-size:16px;line-height:1;padding:0 3px}
.chip .mv:active{color:#fff}

/* ---------- cards ---------- */
section{margin-top:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
.cardtitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cardtitle h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--dim)}

/* ---------- now ---------- */
.now-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.sunrow{display:flex;justify-content:space-between;align-items:center;font-size:14px;gap:8px;flex-wrap:wrap}
.sunrow .mid{color:var(--dim);font-size:12.5px}
.hlrow{display:flex;align-items:center;gap:12px;padding:8px 0}
.hlrow+.hlrow{border-top:1px solid var(--line)}
.hlrow .lbl{color:var(--dim);font-size:13px;width:38px}
.hlrow .tv{font-size:26px;font-weight:600;min-width:52px}
.hlrow .ic{font-size:24px}
.hlrow .cond{color:var(--dim);font-size:13.5px;flex:1;text-align:right}
.hdate{color:var(--dim);font-size:12px;font-weight:600}
.nk{background:var(--card2);border-radius:12px;padding:9px 8px;text-align:center}
.nk .v{font-size:16px;font-weight:600}
.nk .v small{font-size:11px;font-weight:400;color:var(--dim)}
.nk .k{font-size:10.5px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.warr{display:inline-block;transition:transform .3s}

/* ---------- rest of today strip ---------- */
.hstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
.hcell{min-width:56px;flex-shrink:0;background:var(--card2);border-radius:10px;
       padding:8px 4px;text-align:center}
.hcell .ht{font-size:11px;color:var(--dim)}
.hcell .hi{font-size:19px;margin:3px 0}
.hcell .hv{font-size:14px;font-weight:600}
.hcell .hf{font-size:11px;color:var(--dim);margin-top:1px}
.hcell .hp{font-size:11px;color:var(--rain);margin-top:2px}
.hcell.tmw{opacity:.65}

/* ---------- minutecast dial ---------- */
.mcwrap{display:flex;justify-content:center;margin:4px 0 0}
#mcDial{width:min(340px,96%);height:auto}

/* ---------- weather alerts ---------- */
.alert{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--bad);
       border-radius:12px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.ahead{display:flex;align-items:center;gap:8px}
.adot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.aname{font-weight:600;font-size:13.5px}
.aarea{color:var(--dim);font-size:12px;flex:1;text-align:right;white-space:nowrap;
       overflow:hidden;text-overflow:ellipsis}
.achev{color:var(--dim);font-size:11px;transition:transform .2s}
.alert.open .achev{transform:rotate(180deg)}
.abody{display:none;color:var(--dim);font-size:13px;margin-top:8px;white-space:pre-line}
.alert.open .abody{display:block}

/* ---------- minutecast ---------- */
#mcSummary{font-size:14.5px;font-weight:600;margin-bottom:10px}

/* ---------- forecast ---------- */
.seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{flex:1;background:none;border:none;color:var(--dim);padding:6px 14px;font-size:13px;
            font-weight:600;cursor:pointer}
.seg button.on{background:var(--accent);color:#06121f}
.frow{display:grid;grid-template-columns:52px 30px 1fr auto auto;align-items:center;gap:8px;
      padding:8px 2px;border-bottom:1px solid var(--line);font-size:13.5px}
.frow:last-child{border-bottom:none}
.frow .t{color:var(--dim);font-size:12.5px}
.frow .t b{color:var(--txt);font-size:13px}
.frow .ic{font-size:19px;text-align:center}
.frow .mid{display:flex;flex-direction:column;gap:1px;min-width:0}
.frow .mid .l1{font-weight:600}
.frow .mid .l2{color:var(--dim);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frow .rain{text-align:right;color:var(--rain);font-size:12.5px;min-width:56px}
.frow .rain small{color:var(--dim)}
.frow .wind{text-align:right;font-size:12.5px;min-width:72px}
.frow .wind small{color:var(--dim)}
.bike{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:1px}
.bike.good{background:var(--good)} .bike.ok{background:var(--ok)} .bike.bad{background:var(--bad)}
.daysep{padding:7px 2px 3px;color:var(--accent);font-size:11.5px;font-weight:700;
        text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--line)}

/* ---------- map ---------- */
#mapDiv{height:400px;border-radius:12px;overflow:hidden;background:#0a0d12}
#windFrame{width:100%;height:400px;border:none;border-radius:12px;display:none;background:#0a0d12}
.radarbar{display:flex;align-items:center;gap:10px;margin-top:10px}
.radarbar input[type=range]{flex:1;accent-color:var(--accent)}
#radarTime{font-size:12.5px;color:var(--dim);min-width:108px;text-align:right;
            font-variant-numeric:tabular-nums;line-height:1.35}
.leaflet-container{font:inherit}

/* ---------- charts ---------- */
.chart{height:300px;margin-top:6px}
.zrow{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.zbtn{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:8px;
      width:40px;height:30px;font-size:17px;cursor:pointer;line-height:1}
.zbtn:active{background:var(--line)}

/* ---------- history ---------- */
.accums{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.accum{background:var(--card2);border-radius:12px;padding:10px 6px;text-align:center}
.accum .v{font-size:17px;font-weight:700;color:var(--rain)}
.accum .v small{font-size:11px;font-weight:400}
.accum .k{font-size:10.5px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.accum .d{font-size:10px;color:var(--dim);margin-top:2px}

/* ---------- search overlay ---------- */
#searchOverlay{position:fixed;inset:0;background:rgba(10,13,18,.96);z-index:1000;display:none;
               padding:16px;overflow-y:auto}
#searchOverlay.show{display:block}
.sbox{max-width:560px;margin:0 auto}
.srow{display:flex;gap:8px}
#searchInput{flex:1;background:var(--card);border:1px solid var(--line);color:var(--txt);
             border-radius:12px;padding:12px 14px;font-size:16px;outline:none}
#searchInput:focus{border-color:var(--accent)}
.sres{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
      margin-top:8px;cursor:pointer}
.sres:active{background:var(--card2)}
.sres .n{font-weight:600;font-size:15px}
.sres .s{color:var(--dim);font-size:12.5px;margin-top:2px}

/* ---------- misc ---------- */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--card2);
       border:1px solid var(--line);color:var(--txt);padding:10px 18px;border-radius:12px;
       font-size:13.5px;z-index:2000;display:none;max-width:90vw;text-align:center}
.skel{color:var(--dim);text-align:center;padding:26px 0;font-size:13.5px}
footer{margin-top:22px;text-align:center;color:var(--dim);font-size:11px;line-height:1.7}
footer a{color:var(--dim)}
@media(max-width:420px){
  .frow .wind{min-width:64px}
}
</style>
</head>
<body>

<header>
  <div class="hbar">
    <div class="hloc">
      <h1 id="locName">Bike Weather</h1>
      <small id="locSub">choose a location</small>
    </div>
    <button class="ibtn" id="btnSave"  title="Save location">☆</button>
    <button class="ibtn" id="btnLocate" title="My location">📍</button>
    <button class="ibtn" id="btnSearch" title="Search">🔍</button>
    <button class="ibtn" id="btnRefresh" title="Refresh">↻</button>
  </div>
  <div class="chips" id="chips"></div>
</header>

<div class="wrap">

  <div class="page" id="page-now">
  <!-- ALERTS -->
  <section id="alertsBox" style="display:none"></section>

  <!-- NOW: minutecast dial + stats -->
  <section>
    <div class="card">
      <div id="mcSummary" class="skel">Loading current conditions…</div>
      <div class="mcwrap"><svg id="mcDial" viewBox="0 0 260 260" style="display:none"></svg></div>
      <div class="now-grid" id="nowGrid"></div>
    </div>
  </section>

  <!-- TODAY HIGH / LOW -->
  <section>
    <div class="card">
      <div class="cardtitle"><h2 data-i18n="today_wx">Today's weather</h2><span class="hdate" id="hlDate"></span></div>
      <div id="hlRows"></div>
    </div>
  </section>

  <!-- REST OF TODAY -->
  <section>
    <div class="card">
      <div class="cardtitle"><h2 data-i18n="rest">Rest of today</h2></div>
      <div class="hstrip" id="todayStrip"></div>
    </div>
  </section>

  <!-- SUN -->
  <section>
    <div class="card">
      <div class="sunrow" id="sunRow"></div>
    </div>
  </section>

  </div>

  <div class="page" id="page-forecast">
  <!-- FORECAST -->
  <section>
    <div class="card">
      <div class="cardtitle">
        <h2 data-i18n="forecast_t">Forecast</h2>
        <div class="seg">
          <button id="tabHourly" class="on" data-i18n="hourly">Hourly</button>
          <button id="tabDaily" data-i18n="daily">Daily</button>
          <button id="tabGraph" data-i18n="graph">Graph</button>
        </div>
      </div>
      <div id="hourlyList"><div class="skel">…</div></div>
      <div id="dailyList" style="display:none"></div>
      <div id="fcWrap" style="display:none">
        <div id="fcGraph" class="chart"></div>
        <div class="zrow"><button class="zbtn" id="fcZoomOut">−</button><button class="zbtn" id="fcZoomIn">＋</button></div>
      </div>
    </div>
  </section>

  </div>

  <div class="page" id="page-map">
  <!-- MAP -->
  <section>
    <div class="card">
      <div class="cardtitle">
        <h2 data-i18n="map_t">Map</h2>
        <div class="seg">
          <button id="mapModeGeomet" class="on" title="1 km Canadian radar + HRDPS forecast">Radar HD</button>
          <button id="mapModeRadar" data-i18n="global" title="Global radar (RainViewer)">Global</button>
          <button id="mapModeWind" data-i18n="wind">Wind</button>
        </div>
      </div>
      <div id="mapDiv"></div>
      <iframe id="windFrame" title="Wind map"></iframe>
      <div class="radarbar" id="radarBar">
        <button class="ibtn" id="radarPlay">▶</button>
        <input type="range" id="radarSlider" min="0" max="0" value="0" step="1">
        <div id="radarTime">–</div>
      </div>
    </div>
  </section>

  </div>

  <div class="page" id="page-history">
  <!-- HISTORY -->
  <section>
    <div class="card">
      <div class="cardtitle">
        <h2 data-i18n="past_t">Past weather</h2>
        <div class="seg" id="histSeg">
          <button data-range="24h" data-i18n="r24">24h</button>
          <button data-range="48h" class="on" data-i18n="r48">48h</button>
          <button data-range="7d" data-i18n="r7">7d</button>
          <button data-range="31d" data-i18n="r31">31d</button>
        </div>
      </div>
      <div id="meteogram" class="chart" style="display:none"></div>
      <div class="zrow"><button class="zbtn" id="histZoomOut">−</button><button class="zbtn" id="histZoomIn">＋</button></div>
      <div id="histSkel" class="skel">Loading history…</div>
      <div class="accums" id="accumCards"></div>
    </div>
  </section>

  </div>

  <footer>
    Data: <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> ·
    Radar: <a href="https://rainviewer.com" target="_blank">RainViewer</a> ·
    Wind: <a href="https://windy.com" target="_blank">Windy</a><br>
    <span data-i18n="bike">🚴 dot = bike-commute comfort (rain / gusts / extreme temp)</span><br>
    <div class="seg" id="langSeg" style="display:inline-flex;margin:8px 0 4px"><button data-lang="en" class="on">EN</button><button data-lang="fr">FR</button></div><br>
    Bike Weather <b>v11</b>
  </footer>
</div>

<nav id="tabbar">
  <button data-page="now">🌡️<span data-i18n="nav_now">Now</span></button>
  <button data-page="forecast">📅<span data-i18n="nav_fc">Forecast</span></button>
  <button data-page="map">🗺️<span data-i18n="nav_map">Map</span></button>
  <button data-page="history">📈<span data-i18n="nav_hist">History</span></button>
</nav>

<!-- SEARCH OVERLAY -->
<div id="searchOverlay">
  <div class="sbox">
    <div class="srow">
      <input id="searchInput" type="text" placeholder="Search city or place…" autocomplete="off">
      <button class="ibtn" id="searchClose">✕</button>
    </div>
    <div id="searchResults"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script>
"use strict";
/* ================= helpers ================= */
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg, ms=3200){
  const t=$('toast'); t.textContent=msg; t.style.display='block';
  clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none', ms);
}
function dateAdd(ds,n){ const d=new Date(ds+"T00:00:00Z"); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }
function dayName(ds){ return new Date(ds+"T12:00:00").toLocaleDateString(LOC(),{weekday:'short'}); }
function dayLong(ds){ return new Date(ds+"T12:00:00").toLocaleDateString(LOC(),{weekday:'long', day:'numeric', month:'short'}); }
const r1 = x => Math.round(x*10)/10;
const cap = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : '';

/* WMO weather codes → [emoji, description EN, description FR] */
const WMO = {
  0:['☀️','Clear','Ciel dégagé'],1:['🌤️','Mostly clear','Généralement dégagé'],
  2:['⛅','Partly cloudy','Partiellement nuageux'],3:['☁️','Overcast','Couvert'],
  45:['🌫️','Fog','Brouillard'],48:['🌫️','Icy fog','Brouillard givrant'],
  51:['🌦️','Light drizzle','Bruine faible'],53:['🌦️','Drizzle','Bruine'],55:['🌧️','Heavy drizzle','Bruine forte'],
  56:['🌧️','Freezing drizzle','Bruine verglaçante'],57:['🌧️','Freezing drizzle','Bruine verglaçante'],
  61:['🌧️','Light rain','Pluie faible'],63:['🌧️','Rain','Pluie'],65:['🌧️','Heavy rain','Pluie forte'],
  66:['🌧️','Freezing rain','Pluie verglaçante'],67:['🌧️','Freezing rain','Pluie verglaçante'],
  71:['🌨️','Light snow','Neige faible'],73:['🌨️','Snow','Neige'],75:['❄️','Heavy snow','Neige forte'],
  77:['🌨️','Snow grains','Grains de neige'],
  80:['🌦️','Light showers','Averses faibles'],81:['🌧️','Showers','Averses'],82:['⛈️','Violent showers','Averses violentes'],
  85:['🌨️','Snow showers','Averses de neige'],86:['❄️','Snow showers','Averses de neige'],
  95:['⛈️','Thunderstorm','Orage'],96:['⛈️','Storm + hail','Orage avec grêle'],99:['⛈️','Storm + hail','Orage avec grêle']
};
const wmo = c => { const e=WMO[c]; return e ? [e[0], ui.lang==='fr'?e[2]:e[1]] : ['❔','—']; };
function nightIcon(code, isDay){
  if(isDay!==0) return wmo(code)[0];
  if(code===0) return '🌙'; if(code===1||code===2) return '☁️';
  return wmo(code)[0];
}
function windArrow(deg){ // arrow points where the wind blows TO
  return `<span class="warr" style="transform:rotate(${(deg+180)%360}deg)">↑</span>`;
}
function compass(deg){
  const pts=['N','NE','E','SE','S','SW','W','NW'];
  return pts[Math.round(deg/45)%8];
}
/* bike comfort: rain, gusts, extreme temps */
function bikeClass(prob, mm, gust, temp){
  let s=0;
  if(mm>=0.5 || prob>=60) s+=2; else if(mm>=0.1 || prob>=35) s+=1;
  if(gust>=45) s+=2; else if(gust>=32) s+=1;
  if(temp<=-8 || temp>=32) s+=1;
  return s>=2?'bad':s===1?'ok':'good';
}

/* ================= state / storage ================= */
const DEFAULT_LOC={name:'Montréal', lat:45.5088, lon:-73.5878};
const LS_SAVED='bw_saved', LS_LAST='bw_last', LS_UI='bw_ui';
let ui={page:'now', ftab:'hourly', mmode:'geomet', hrange:'48h', lang:'en'};
try{ Object.assign(ui, JSON.parse(localStorage.getItem(LS_UI)||'{}')); }catch(e){}
const saveUI=()=>localStorage.setItem(LS_UI, JSON.stringify(ui));

/* ================= i18n ================= */
const I18N={
en:{
  next3h:'MinuteCast — precipitation', today_wx:"Today's weather", rest:'Rest of today',
  forecast_t:'Forecast', map_t:'Map', past_t:'Past weather',
  hourly:'Hourly', daily:'Daily', graph:'Graph', global:'Global', wind:'Wind',
  nav_now:'Now', nav_fc:'Forecast', nav_map:'Map', nav_hist:'History',
  high:'High', low:'Low', tonight:'Tonight',
  gusts:'Gusts', humidity:'Humidity', precipnow:'Precip now', windk:'Wind',
  daylight:'of daylight', feels:'feels', feelslike:'Feels like',
  humidex:' (humidex)', windchill:' (wind chill)',
  mc_none:'☂️ No precipitation expected for the next 3 hours.',
  mc_cont:'🌧️ Precipitation continuing for the next 3 hours.',
  mc_end:m=>`🌧️ Precipitation ending in ~${m} min.`,
  mc_start:m=>`🌧️ Precipitation starting in ~${m} min`,
  mc_endat:m=>`, ending ~${m} min from now`,
  heavy:' Heavy at times.', moderate:' Moderate intensity.',
  dial_dry:'dry hour', dial_in:m=>`in ${m} min`, dial_for:m=>`for ~${m} min`,
  temp:'Temp', precip:'Precip', sunshine:'Sunshine', maxtemp:'Max temp', mintemp:'Min temp',
  today:'Today', yesterday:'Yesterday', d7:'7 days', d30:'30 days', sofar:'so far', rainyd:'rainy d.',
  updated:'updated', search_ph:'Search city or place…', edit:'✎ edit', done:'✓ done',
  remove:n=>`Remove "${n}" from saved locations?`, noresults:'No results',
  fcast_tag:'forecast', nowword:'now',

/* ================= location ================= */
async function setLocation(l, {fetchNow=true}={}){
  loc=l;
  localStorage.setItem(LS_LAST, JSON.stringify(l));
  $('locName').textContent=l.name||'Unknown place';
  $('locSub').textContent=`${l.lat.toFixed(3)}, ${l.lon.toFixed(3)}`;
  renderChips(); updateSaveBtn();
  if(fetchNow) await fetchAll(true);   // location changed → always refetch
}
function updateSaveBtn(){
  const b=$('btnSave');
  if(isSaved(loc)){ b.textContent='★'; b.classList.add('on'); b.title='Remove from saved'; }
  else{ b.textContent='☆'; b.classList.remove('on'); b.title='Save location'; }
}
let chipEdit=false;
function renderChips(){
  const c=$('chips'); c.innerHTML='';
  const saved=getSaved();
  saved.forEach((s,i)=>{
    const cur = loc && Math.abs(s.lat-loc.lat)<1e-4 && Math.abs(s.lon-loc.lon)<1e-4;
    const el=document.createElement('div');
    el.className='chip'+(cur?' cur':'');
    el.innerHTML=`<span>${esc(s.name)}</span>`
      +(chipEdit?'<span class="mv l" title="Move left">‹</span><span class="mv r" title="Move right">›</span><span class="x" title="Remove">✕</span>':'');
    el.querySelector('span').onclick=()=>{ if(!chipEdit) setLocation(s); };
    if(chipEdit){
      const move=d=>{
        const a=getSaved(), j=i+d;
        if(j<0||j>=a.length) return;
        [a[i],a[j]]=[a[j],a[i]];
        setSaved(a); renderChips();
      };
      el.querySelector('.mv.l').onclick=e=>{ e.stopPropagation(); move(-1); };
      el.querySelector('.mv.r').onclick=e=>{ e.stopPropagation(); move(1); };
      el.querySelector('.x').onclick=e=>{
        e.stopPropagation();
        if(confirm(t('remove')(s.name))){
          setSaved(getSaved().filter(x=>!(x.lat===s.lat&&x.lon===s.lon)));
          renderChips(); updateSaveBtn();
        }
      };
    }
    c.appendChild(el);
  });
  if(saved.length){
    const eb=document.createElement('div');
    eb.className='chip'; eb.style.borderStyle='dashed'; eb.style.color='var(--dim)';
    eb.textContent=chipEdit?t('done'):t('edit');
    eb.onclick=()=>{ chipEdit=!chipEdit; renderChips(); };
    c.appendChild(eb);
  }
}
$('btnSave').onclick=()=>{

  if(isSaved(loc)) setSaved(getSaved().filter(s=>!(Math.abs(s.lat-loc.lat)<1e-4&&Math.abs(s.lon-loc.lon)<1e-4)));
  else setSaved([...getSaved(),loc]);
  renderChips(); updateSaveBtn();
};

async function reverseName(lat,lon){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
    const j=await r.json();
    return j.locality || j.city || j.principalSubdivision || 'My location';
  }catch(e){ return 'My location'; }
}
function locate(){
  if(!navigator.geolocation){ toast('Geolocation not available'); return; }
  toast('Locating…',1500);
  navigator.geolocation.getCurrentPosition(async p=>{
    const lat=+p.coords.latitude.toFixed(4);
    const lon=+p.coords.longitude.toFixed(4);
    const name=await reverseName(lat,lon);
    setLocation({name:`📍 ${name}`,lat,lon});
  },err=>{
    toast('GPS unavailable ('+err.message+'). Using '+(loc?loc.name:DEFAULT_LOC.name)+' — search 🔍 to change city.',5000);
    if(!loc) setLocation({...DEFAULT_LOC});
  },{enableHighAccuracy:false,timeout:10000,maximumAge:300000});
}

/* ================= fetching ================= */
async function fetchAll(force){
  if(!loc) return;
  if(!force && Date.now()-lastFetch<60000 && data) return;
  try{
    const base=`latitude=${loc.lat}&longitude=${loc.lon}&timezone=auto&wind_speed_unit=kmh`;
    const mainUrl='https://api.open-meteo.com/v1/forecast?'+base
      +'&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m'
      +'&minutely_15=precipitation,temperature_2m,wind_speed_10m,shortwave_radiation&forecast_minutely_15=384'
      +'&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m,is_day'
      +'&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,sunrise,sunset'
      +'&forecast_days=14';
    const histUrl='https://api.open-meteo.com/v1/forecast?'+base
      +'&hourly=temperature_2m,precipitation,wind_speed_10m'
      +'&daily=precipitation_sum,temperature_2m_max,temperature_2m_min'
      +'&past_days=31&forecast_days=1';

    const [mr, hr] = await Promise.all([fetch(mainUrl), fetch(histUrl)]);
    if(!mr.ok) throw new Error('forecast HTTP '+mr.status);
    data = await mr.json();
    hist = hr.ok ? await hr.json() : null;
    lastFetch=Date.now();

    renderNow(); renderMinutecast(); renderToday(); renderHourly(); renderDaily(); renderFcGraph();
    renderHistory(); renderAccums();
    updateMapLocation();
    fetchAlerts();
    $('locSub').textContent = `${loc.lat.toFixed(3)}, ${loc.lon.toFixed(3)} · ${t('updated')} ${new Date().toLocaleTimeString(LOC(),{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){
    console.error(e);
    toast('Could not load weather data: '+e.message, 5000);
  }
}

  // today's high/low card (AccuWeather-style)
  const dl=data.daily, hr=data.hourly, today=c.time.slice(0,10), tmw=dateAdd(today,1);
  // tonight's low: min hourly temp between 18:00 today and 08:00 tomorrow
  let i0=Math.max(hr.time.indexOf(today+'T18:00'), hourNowIdx());   // tonight window starts at 18:00 or now, whichever is later
  let i1=hr.time.indexOf(tmw+'T08:00'); if(i1<0) i1=Math.min(i0+14,hr.time.length-1);
  let lowT=hr.temperature_2m[i0];
  for(let i=i0;i<=i1;i++) lowT=Math.min(lowT,hr.temperature_2m[i]);
  // tonight's condition: ~22:00 today (or 01:00 tomorrow if already past)
  let ti=hr.time.indexOf(today+'T22:00'); if(ti<0) ti=hr.time.indexOf(tmw+'T01:00');
  const tCode=ti>-1?hr.weather_code[ti]:dl.weather_code[0];
  $('hlDate').textContent=new Date(c.time).toLocaleDateString(LOC(),{weekday:'short',month:'short',day:'numeric'});
  $('hlRows').innerHTML=`

    <div class="hlrow"><span class="lbl">${t('low')}</span><span class="tv">${Math.round(lowT)}°</span>

}

/* ================= rest of today strip ================= */
function hourNowIdx(){                    // hourly arrays start at midnight — index of the current hour
  const h=data.hourly;
  for(let i=h.time.length-1;i>=0;i--) if(h.time[i]<=data.current.time) return i;
  return 0;
}
function renderToday(){
  const h=data.hourly, today=data.current.time.slice(0,10), out=[];
  let count=0;
  for(let i=hourNowIdx();i<h.time.length;i++){
    const isToday=h.time[i].slice(0,10)===today;
    if(!isToday && count>=6) break;          // past midnight: only pad up to 6 cells
    const prob=h.precipitation_probability?.[i]??0;
    const bc=bikeClass(prob,h.precipitation[i]??0,h.wind_gusts_10m[i],h.temperature_2m[i]);
    out.push(`<div class="hcell${isToday?'':' tmw'}">
      <div class="ht"><span class="bike ${bc}"></span>${h.time[i].slice(11,16)}</div>
      <div class="hi">${nightIcon(h.weather_code[i],h.is_day[i])}</div>
      <div class="hv">${Math.round(h.temperature_2m[i])}°</div>
      <div class="hf">${Math.round(h.apparent_temperature[i])}°</div>
      <div class="hp">${prob}%</div>
    </div>`);
    count++;
  }
  $('todayStrip').innerHTML=out.join('');
}

/* ================= MinuteCast ================= */
function renderMinutecast(){
  const m=data.minutely_15;
  const sum=$('mcSummary');
  if(!m || !m.time || !m.time.length){ sum.textContent='15-min nowcast unavailable here.'; sum.classList.remove('skel'); renderDial([0],0); return; }
  const nowT=data.current.time;
  let si=-1;
  for(let i=m.time.length-1;i>=0;i--){ if(m.time[i]<=nowT){ si=i; break; } }
  if(si<0) si=0;
  const times=m.time.slice(si,si+12), prec=m.precipitation.slice(si,si+12).map(v=>v==null?0:v);
  const wet=i=>prec[i]>=0.1;

  // summary text
  let txt;
  const firstWet=prec.findIndex(v=>v>=0.1);
  if(firstWet===-1){
    txt=t('mc_none');
  }else if(firstWet===0){
    let end=prec.findIndex((v,i)=>i>0&&v<0.1);
    txt = end===-1 ? t('mc_cont') : t('mc_end')(end*15);
  }else{
    txt=t('mc_start')(firstWet*15);
    let end=prec.findIndex((v,i)=>i>firstWet&&v<0.1);
    if(end>-1) txt+=t('mc_endat')(end*15);
    txt+='.';
  }
  const mx=Math.max(...prec);
  if(mx>=2.5) txt+=t('heavy'); else if(mx>=1) txt+=t('moderate');
  sum.textContent=txt; sum.classList.remove('skel');
  renderDial(prec, Math.max(0, Math.round((Date.parse(nowT)-Date.parse(m.time[si]))/60000)));
}

/* +/- buttons: shrink or grow the x-axis window around its centre */
function chartZoom(chart,factor){
  if(!chart) return;
  const z=chart.getOption().dataZoom[0];
  let s=z.start??0, e=z.end??100;
  const c=(s+e)/2;
  let half=Math.max(0.5, Math.min(50, (e-s)/2*factor));
  s=c-half; e=c+half;
  if(s<0){ e-=s; s=0; }
  if(e>100){ s-=e-100; e=100; s=Math.max(0,s); }
  chart.dispatchAction({type:'dataZoom', start:s, end:e});
}

      </div>
      <div class="rain">${d.precipitation_probability_max?.[i]??0}%${mm>=0.1?`<br><small>${r1(mm)} mm</small>`:''}</div>
      <div class="wind">${Math.round(d.wind_speed_10m_max[i])}<br><small>g ${Math.round(d.wind_gusts_10m_max[i])} km/h</small></div>
    </div>`);
  }
  $('dailyList').innerHTML=out.join('');
}

/* ================= forecast meteogram (48 h, 15-min steps) ================= */
function renderFcGraph(){
  if(!window.echarts || !data || !data.minutely_15 || !data.minutely_15.temperature_2m) return;
  const el=$('fcGraph');
  if(!el.offsetParent) return;                     // hidden tab — rendered when shown
  const m=data.minutely_15, nowT=data.current.time;
  let si=m.time.findLastIndex(t=>t<=nowT); if(si<0) si=0;
  const P=arr=>m.time.slice(si).map((t,i)=>[Date.parse(t), arr[si+i]??0]);
  const temp=P(m.temperature_2m), prec=P(m.precipitation),
        wind=P(m.wind_speed_10m), rad=P(m.shortwave_radiation);
  if(temp.length<2) return;
  const t0=temp[0][0], t1=temp[temp.length-1][0];

  // night bands: sunset → next sunrise
  const dd=data.daily, nights=[];
  const sr0=Date.parse(dd.sunrise[0]);
  if(sr0>t0) nights.push([{xAxis:t0},{xAxis:Math.min(sr0,t1)}]);
  for(let i=0;i<dd.time.length;i++){
    const a=Math.max(t0,Date.parse(dd.sunset[i]));
    const b=Math.min(t1,(i+1<dd.time.length)?Date.parse(dd.sunrise[i+1]):t1);
    if(b>a) nights.push([{xAxis:a},{xAxis:b}]);
  }

  if(!fcChart) fcChart=echarts.init(el);
  const endPct=Math.min(100, 36*3600e3/(t1-t0)*100);   // open on the first 36 h
  fcChart.setOption({
    animation:false,
    legend:chLegend(),
    tooltip:chTooltip(),
    toolbox:chToolbox(),
    grid:{left:40,right:44,top:30,bottom:52},
    xAxis:chXTime(),
    yAxis:[chYTemp(),chYRain(),chYHidden(20,1.25),chYHidden(400,1.05)],
    dataZoom:chZoom(endPct),
    series:[
      {name:t('sunshine'),type:'line',yAxisIndex:3,data:rad,symbol:'none',color:CH.sun,
       lineStyle:{color:CH.sun,width:1.2},areaStyle:{color:'rgba(255,213,77,.15)'},
       tooltip:{valueFormatter:v=>Math.round(v)+' W/m²'},
       markArea:{silent:true,itemStyle:{color:'rgba(0,0,0,.25)'},data:nights}},
      {name:t('precip'),type:'bar',yAxisIndex:1,data:prec,color:CH.rain,
       tooltip:{valueFormatter:v=>r1(v)+' mm/15min'}},
      {name:t('windk'),type:'line',yAxisIndex:2,data:wind,symbol:'none',color:CH.wind,
       lineStyle:{color:CH.wind,width:1.3,type:'dashed'},
       tooltip:{valueFormatter:v=>Math.round(v)+' km/h'}},
      {name:t('temp'),type:'line',data:temp,symbol:'none',z:5,color:CH.temp,
       lineStyle:{color:CH.temp,width:2.4},
       tooltip:{valueFormatter:v=>Math.round(v)+' °C'}}
    ]
  },true);
  fcChart.resize();
}

/* ================= map: radar + wind ================= */
const GEOMET='https://geo.weather.gc.ca/geomet';
let map=null, marker=null, radarTimer=null;
/* two radar sources sharing the same slider:
   rv = RainViewer (global, −2 h → +30 min, free tiles max zoom 7)
   gm = MSC GeoMet (Canada, 1 km radar −3 h + HRDPS forecast → +12 h, full zoom) */
const sources={ rv:{frames:[],idx:-1,ready:false}, gm:{frames:[],idx:-1,ready:false} };
const activeSrc=()=>ui.mmode==='geomet'?'gm':'rv';

function initMap(){
  if(map) return;
  map=L.map('mapDiv',{zoomControl:true,attributionControl:true}).setView([loc.lat,loc.lon],8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap, © CARTO', maxZoom:18, subdomains:'abcd'
  }).addTo(map);
  marker=L.circleMarker([loc.lat,loc.lon],{radius:6,color:'#4da3ff',fillColor:'#4da3ff',fillOpacity:.9}).addTo(map);
  loadRainviewer(); loadGeomet();
  setTimeout(()=>map.invalidateSize(),300);
}
function updateMapLocation(){
  if(!loc) return;
  if(map){ map.setView([loc.lat,loc.lon],map.getZoom()); marker.setLatLng([loc.lat,loc.lon]); }
  else if(ui.page==='map') applyMapMode();   // lazy-init radar or wind now that we have a location
  // refresh windy iframe target if loaded
  if($('windFrame').dataset.loaded) setWindSrc();
}

async function loadRainviewer(){
  try{
    const j=await (await fetch('https://api.rainviewer.com/public/weather-maps.json')).json();
    const past=j.radar?.past||[], nowcast=j.radar?.nowcast||[];
    sources.rv.frames=[...past,...nowcast].map((f,i)=>({
      timeMs:f.time*1000, fcst:i>=past.length,
      // free RainViewer tiles only exist up to zoom 7 — upscale beyond that
      layer:L.tileLayer(`${j.host}${f.path}/256/{z}/{x}/{y}/4/1_1.png`,
        {opacity:0, tileSize:256, zIndex:400, maxNativeZoom:7})
    }));
    sources.rv.idx=Math.max(0,past.length-1);   // latest observed frame
    sources.rv.ready=true;
    if(activeSrc()==='rv') bindSlider();
    clearTimeout(loadRainviewer._t); loadRainviewer._t=setTimeout(loadRainviewer,5*60*1000);
  }catch(e){ if(activeSrc()==='rv') $('radarTime').textContent='radar unavailable'; }
}

function wmsLayer(name,timeMs){
  const iso=new Date(timeMs).toISOString().slice(0,19)+'Z';
  return L.tileLayer.wms(GEOMET,{layers:name,format:'image/png',transparent:true,
    version:'1.3.0',opacity:0,zIndex:410,TIME:iso});
}
async function geometTimeDim(layerName){
  const txt=await (await fetch(`${GEOMET}?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetCapabilities&LAYERS=${layerName}`)).text();
  const m=txt.match(/<Dimension name="time"[^>]*>([^<]+)</);
  const [start,end]=m[1].split('/');
  return {start:Date.parse(start), end:Date.parse(end)};
}
async function loadGeomet(){
  try{
    const [rad,fc]=await Promise.all([
      geometTimeDim('RADAR_1KM_RRAI'),        // observed radar: past 3 h, 6-min steps
      geometTimeDim('HRDPS.CONTINENTAL_RT')   // model precip rate: hourly, ~+39 h
    ]);
    const frames=[];
    for(let t=rad.end-3*3600e3; t<=rad.end; t+=12*60e3)   // every 12 min, anchored on latest scan
      frames.push({timeMs:t, fcst:false, layer:wmsLayer('RADAR_1KM_RRAI',t)});
    const lastObs=frames.length-1;
    const firstFc=Math.ceil((rad.end+1)/3600e3)*3600e3;    // next full hour after latest scan
    const lastFc=Math.min(fc.end, rad.end+12*3600e3);
    for(let t=firstFc; t<=lastFc; t+=3600e3)
      frames.push({timeMs:t, fcst:true, layer:wmsLayer('HRDPS.CONTINENTAL_RT',t)});
    sources.gm.frames=frames;
    sources.gm.idx=lastObs;
    sources.gm.ready=true;
    if(activeSrc()==='gm') bindSlider();
    clearTimeout(loadGeomet._t); loadGeomet._t=setTimeout(loadGeomet,10*60*1000);
  }catch(e){ if(activeSrc()==='gm') $('radarTime').textContent='GeoMet unavailable'; }
}

function bindSlider(){
  const s=sources[activeSrc()];
  if(!s.ready){ $('radarTime').textContent='loading…'; return; }
  if(!s.frames.length){ $('radarTime').textContent='no data'; return; }
  $('radarSlider').max=s.frames.length-1;
  showFrame(s.idx<0?s.frames.length-1:s.idx);
}
function showFrame(i){
  const s=sources[activeSrc()];
  if(!map||!s.frames.length) return;
  i=Math.min(i,s.frames.length-1); s.idx=i;
  const f=s.frames[i];
  for(const k of ['rv','gm']) for(const o of sources[k].frames)
    if(o.layer!==f.layer) o.layer.setOpacity(0);
  if(!map.hasLayer(f.layer)) f.layer.addTo(map);
  f.layer.setOpacity(0.75);
  const nx=s.frames[i+1];
  if(nx && !map.hasLayer(nx.layer)) nx.layer.addTo(map);   // preload next frame
  const diffMin=Math.round((f.timeMs-Date.now())/60000);
  const rel=Math.abs(diffMin)<3?t('nowword')
    :(Math.abs(diffMin)>=90?(diffMin>0?'+':'')+Math.round(diffMin/6)/10+' h'
    :(diffMin>0?'+':'')+diffMin+' min');
  $('radarTime').innerHTML=`${new Date(f.timeMs).toLocaleTimeString(LOC(),{hour:'2-digit',minute:'2-digit'})} (${rel})`
    +(f.fcst?`<br><span style="color:var(--accent)">${t('fcast_tag')}</span>`:'');
  $('radarSlider').value=i;
}
$('radarSlider').addEventListener('input',e=>showFrame(+e.target.value));
$('radarPlay').onclick=()=>{
  if(radarTimer){ clearInterval(radarTimer); radarTimer=null; $('radarPlay').textContent='▶'; return; }
  $('radarPlay').textContent='⏸';
  radarTimer=setInterval(()=>{
    const s=sources[activeSrc()];
    if(s.frames.length) showFrame((s.idx+1)%s.frames.length);
  },650);
};
function setWindSrc(){
  const f=$('windFrame');
  f.src=`https://embed.windy.com/embed2.html?lat=${loc.lat}&lon=${loc.lon}&detailLat=${loc.lat}&detailLon=${loc.lon}`
    +`&zoom=8&level=surface&overlay=wind&product=ecmwf&menu=&message=&marker=true&calendar=now`
    +`&type=map&location=coordinates&metricWind=km%2Fh&metricTemp=%C2%B0C`;
  f.dataset.loaded='1';
}
function applyMapMode(){
  const wind=ui.mmode==='wind';
  const btns={geomet:'mapModeGeomet',radar:'mapModeRadar',wind:'mapModeWind'};
  for(const k in btns) $(btns[k]).classList.toggle('on',k===ui.mmode);
  $('mapDiv').style.display=wind?'none':'';
  $('radarBar').style.display=wind?'none':'flex';
  $('windFrame').style.display=wind?'block':'none';
  if(wind){
    if(!$('windFrame').dataset.loaded && loc) setWindSrc();
  }else if(loc){
    if(!map) initMap();
    else setTimeout(()=>map.invalidateSize(),100);
    bindSlider();
  }
}
$('mapModeGeomet').onclick=()=>{ ui.mmode='geomet'; saveUI(); applyMapMode(); };
$('mapModeRadar').onclick =()=>{ ui.mmode='radar';  saveUI(); applyMapMode(); };
$('mapModeWind').onclick  =()=>{ ui.mmode='wind';   saveUI(); applyMapMode(); };

/* ================= history ================= */
let histRange=ui.hrange||'48h';
$('histSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  for(const x of $('histSeg').children) x.classList.remove('on');
  b.classList.add('on'); histRange=b.dataset.range;
  ui.hrange=histRange; saveUI();
  renderHistory();
});

function histNowIdx(){
  const nowT=data.current.time;
  const t=hist.hourly.time;
  for(let i=t.length-1;i>=0;i--){ if(t[i]<=nowT) return i; }
  return t.length-1;
}

function renderHistory(){
  const el=$('meteogram'), skel=$('histSkel');
  if(!hist||!data){ skel.textContent='History unavailable.'; return; }
  if(!window.echarts){ skel.textContent='Chart library failed to load — check connection.'; return; }
  skel.style.display='none'; el.style.display='block';
  if(!el.offsetParent) return;                     // hidden tab — rendered when shown

  const nowMs=Date.parse(data.current.time);
  let series;
  if(histRange==='31d'){
    const d=hist.daily, today=data.current.time.slice(0,10);
    const end=d.time.indexOf(today); const e2=end===-1?d.time.length:end+1;
    const Pd=arr=>d.time.slice(0,e2).map((t,i)=>[Date.parse(t)+12*3600e3, arr[i]??0]);
    series=[
      {name:t('precip'),type:'bar',yAxisIndex:1,data:Pd(d.precipitation_sum),color:CH.rain,
       tooltip:{valueFormatter:v=>r1(v)+' mm'}},
      {name:t('maxtemp'),type:'line',data:Pd(d.temperature_2m_max),symbol:'none',z:5,color:CH.temp,
       lineStyle:{color:CH.temp,width:2},tooltip:{valueFormatter:v=>Math.round(v)+' °C'}},
      {name:t('mintemp'),type:'line',data:Pd(d.temperature_2m_min),symbol:'none',color:'#6fa8dc',
       lineStyle:{color:'#6fa8dc',width:1.6},tooltip:{valueFormatter:v=>Math.round(v)+' °C'}}
    ];
  }else{
    const n={'24h':24,'48h':48,'7d':168}[histRange];
    const ni=histNowIdx(), s0=Math.max(0,ni-n+1);
    const hh=hist.hourly, e=hh.time.length;       // includes the rest of today (forecast_days=1)
    const Ph=arr=>hh.time.slice(s0,e).map((t,i)=>[Date.parse(t), arr[s0+i]??0]);
    const t1=Date.parse(hh.time[e-1]);
    series=[
      {name:t('precip'),type:'bar',yAxisIndex:1,data:Ph(hh.precipitation),color:CH.rain,
       tooltip:{valueFormatter:v=>r1(v)+' mm'}},
      {name:t('windk'),type:'line',yAxisIndex:2,data:Ph(hh.wind_speed_10m),symbol:'none',color:CH.wind,
       lineStyle:{color:CH.wind,width:1.3,type:'dashed'},
       tooltip:{valueFormatter:v=>Math.round(v)+' km/h'}},
      {name:t('temp'),type:'line',data:Ph(hh.temperature_2m),symbol:'none',z:5,color:CH.temp,
       lineStyle:{color:CH.temp,width:2.4},tooltip:{valueFormatter:v=>Math.round(v)+' °C'},
       markLine:{symbol:'none',lineStyle:{color:CH.accent,type:'dashed'},
         label:{formatter:t('nowword'),color:CH.accent},data:[{xAxis:nowMs}]},
       markArea:{silent:true,itemStyle:{color:'rgba(77,163,255,.06)'},
         data:[[{xAxis:nowMs},{xAxis:t1}]]}}
    ];
  }
  if(!histChart) histChart=echarts.init(el);
  histChart.setOption({
    animation:false,
    legend:chLegend(),
    tooltip:chTooltip(),
    toolbox:chToolbox(),
    grid:{left:40,right:44,top:30,bottom:52},
    xAxis:chXTime(),
    yAxis:[chYTemp(),chYRain(),chYHidden(20,1.25)],
    dataZoom:chZoom(),
    series
  },true);
  histChart.resize();
}

function renderAccums(){
  const box=$('accumCards'); box.innerHTML='';
  if(!hist||!data) return;
  const h=hist.hourly, d=hist.daily;
  const nowT=data.current.time, today=nowT.slice(0,10);
  const ni=histNowIdx();

  function sumHourly(fromDate){
    let s=0;
    for(let i=0;i<=ni;i++){
      const dt=h.time[i].slice(0,10);
      if(dt>=fromDate) s+=h.precipitation[i]||0;
    }
    return s;
  }
  function rainyDays(fromDate){
    let c=0;
    for(let i=0;i<d.time.length;i++)
      if(d.time[i]>=fromDate && d.time[i]<=today && (d.precipitation_sum[i]||0)>=1) c++;
    return c;
  }
  const yIdx=d.time.indexOf(dateAdd(today,-1));
  const items=[
    [t('today'), sumHourly(today), t('sofar')],
    [t('yesterday'), yIdx>-1?(d.precipitation_sum[yIdx]||0):0, ''],
    [t('d7'), sumHourly(dateAdd(today,-6)), rainyDays(dateAdd(today,-6))+' '+t('rainyd')],
    [t('d30'), sumHourly(dateAdd(today,-29)), rainyDays(dateAdd(today,-29))+' '+t('rainyd')]
  ];
  for(const [k,v,note] of items){
    box.insertAdjacentHTML('beforeend',
      `<div class="accum"><div class="v">${v<10?r1(v):Math.round(v)}<small> mm</small></div>
       <div class="k">${k}</div>${note?`<div class="d">${note}</div>`:''}</div>`);
  }
}

/* ================= MinuteCast dial (next 60 min) ================= */
function renderDial(prec, offMin){
  const svg=$('mcDial');
  const C=130, rIn=86, rOut=106;
  const vAt=mn=>{const am=mn+offMin; const i=Math.min(prec.length-1,Math.floor(am/15));
    const nx=Math.min(prec.length-1,i+1); return prec[i]+(prec[nx]-prec[i])*((am%15)/15);};
  let s='';
  for(let mnt=0;mnt<60;mnt++){
    const v=vAt(mnt);
    const col=v<0.05?'#2a3242':v<0.5?'#5ba3f5':v<2?'#3d8bfd':'#7a4dff';
    const a=(mnt/60)*2*Math.PI - Math.PI/2;
    s+=`<line x1="${(C+rIn*Math.cos(a)).toFixed(1)}" y1="${(C+rIn*Math.sin(a)).toFixed(1)}"`
      +` x2="${(C+rOut*Math.cos(a)).toFixed(1)}" y2="${(C+rOut*Math.sin(a)).toFixed(1)}"`
      +` stroke="${col}" stroke-width="5.5" stroke-linecap="round"/>`;
  }
  // clock labels: now at 12 o'clock, +15 at 3, +30 at 6, +45 at 9
  s+=`<text x="${C}" y="14" fill="#4da3ff" font-size="12" font-weight="700" text-anchor="middle">${t('nowword').toUpperCase()}</text>`;
  s+=`<text x="248" y="${C+4}" fill="#8b96a8" font-size="11" text-anchor="middle">+15</text>`;
  s+=`<text x="${C}" y="254" fill="#8b96a8" font-size="11" text-anchor="middle">+30</text>`;
  s+=`<text x="12" y="${C+4}" fill="#8b96a8" font-size="11" text-anchor="middle">+45</text>`;
  // centre: current conditions
  const c=data.current;
  s+=`<text x="${C}" y="${C-38}" font-size="26" text-anchor="middle">${nightIcon(c.weather_code,c.is_day)}</text>`;
  s+=`<text x="${C}" y="${C+14}" fill="#e8edf4" font-size="46" font-weight="300" text-anchor="middle">${Math.round(c.temperature_2m)}°</text>`;
  s+=`<text x="${C}" y="${C+38}" fill="#e8edf4" font-size="12.5" font-weight="600" text-anchor="middle">${wmo(c.weather_code)[1]}</text>`;
  s+=`<text x="${C}" y="${C+56}" fill="#8b96a8" font-size="12" text-anchor="middle">${cap(t('feels'))} ${Math.round(c.apparent_temperature)}°</text>`;
  svg.innerHTML=s; svg.style.display='block';
}

/* ================= Environment Canada weather alerts ================= */
let alerts=[];
async function fetchAlerts(){
  if(!loc) return;
  try{
    const d=0.05;
    const u=`https://api.weather.gc.ca/collections/weather-alerts/items?f=json&limit=20`
      +`&bbox=${(loc.lon-d).toFixed(3)},${(loc.lat-d).toFixed(3)},${(loc.lon+d).toFixed(3)},${(loc.lat+d).toFixed(3)}`;
    const j=await (await fetch(u)).json();
    const rank={red:0,orange:1,yellow:2};
    alerts=(j.features||[]).map(f=>f.properties)
      .sort((a,b)=>(rank[a.risk_colour_en]??3)-(rank[b.risk_colour_en]??3));
  }catch(e){ alerts=[]; }
  renderAlerts();
}
function renderAlerts(){
  const box=$('alertsBox');
  if(!alerts.length){ box.style.display='none'; box.innerHTML=''; return; }
  const fr=ui.lang==='fr';
  box.style.display='';
  box.innerHTML=alerts.map(a=>{
    const col={red:'#ff4d4d',orange:'#ff9f43',yellow:'#f2c94c'}[a.risk_colour_en]||'#8b96a8';
    const name=cap((fr?a.alert_name_fr:a.alert_name_en)||'');
    const area=(fr?a.feature_name_fr:a.feature_name_en)||'';
    const txt=((fr?a.alert_text_fr:a.alert_text_en)||'').trim();
    return `<div class="alert" style="border-left-color:${col}">
      <div class="ahead"><span class="adot" style="background:${col}"></span>
        <span class="aname">⚠️ ${esc(name)}</span><span class="aarea">${esc(area)}</span><span class="achev">▾</span></div>
      <div class="abody">${esc(txt)}</div></div>`;
  }).join('');
  for(const h of box.querySelectorAll('.ahead'))
    h.onclick=()=>h.parentElement.classList.toggle('open');
}

$('langSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  ui.lang=b.dataset.lang; saveUI(); applyLang(); renderAll();
});

(function init(){
  applyLang();
  renderChips();
  applyFtab();
  for(const b of $('histSeg').children) b.classList.toggle('on', b.dataset.range===histRange);
  showPage(ui.page);
  let last=null;
  try{ last=JSON.parse(localStorage.getItem(LS_LAST)); }catch(e){}
  if(last && typeof last.lat==='number'){
    setLocation(last);
    // silently try to refresh GPS position in background if it was a GPS location
    if((last.name||'').startsWith('📍') && navigator.geolocation){
      navigator.geolocation.getCurrentPosition(async p=>{
        const lat=+p.coords.latitude.toFixed(4), lon=+p.coords.longitude.toFixed(4);
        if(Math.abs(lat-last.lat)>0.02||Math.abs(lon-last.lon)>0.02){
          const name=await reverseName(lat,lon);
          setLocation({name:`📍 ${name}`,lat,lon});
        }
      },()=>{},{timeout:8000,maximumAge:600000});
    }
  }else{
    // first run: load the default city immediately, refine with GPS in the background
    setLocation({...DEFAULT_LOC});
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(async p=>{
        const lat=+p.coords.latitude.toFixed(4), lon=+p.coords.longitude.toFixed(4);
        const name=await reverseName(lat,lon);
        setLocation({name:`📍 ${name}`,lat,lon});
      },()=>{},{enableHighAccuracy:false,timeout:8000,maximumAge:600000});
    }
  }
  // refresh when returning to the app if data is stale (>15 min)
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible' && Date.now()-lastFetch>15*60*1000) fetchAll(true);
  });
})();
